name: CI & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'scripts/**'
      - '*.rb'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'scripts/**'
      - '*.rb'
      - '.gitignore'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  check:
    name: Check, Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check format
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --verbose

  build:
    name: Build Release
    needs: [check, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-amd64-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            suffix: linux-arm64-musl
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-amd64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64
            use_cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            suffix: windows-arm64
            use_cross: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build Release
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/awsx"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BINARY_PATH="${BINARY_PATH}.exe"
          fi
          
          # Handle cases where target directory is just target/release for native builds
          if [ ! -f "$BINARY_PATH" ]; then
            BINARY_PATH="target/release/awsx"
            if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
              BINARY_PATH="${BINARY_PATH}.exe"
            fi
          fi
          
          mkdir -p dist
          cp "$BINARY_PATH" dist/
          cd dist
          tar -czf ../awsx-${{ matrix.suffix }}.tar.gz *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: awsx-${{ matrix.suffix }}
          path: awsx-${{ matrix.suffix }}.tar.gz

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            awsx-linux-amd64/awsx-linux-amd64.tar.gz
            awsx-linux-amd64-musl/awsx-linux-amd64-musl.tar.gz
            awsx-linux-arm64/awsx-linux-arm64.tar.gz
            awsx-linux-arm64-musl/awsx-linux-arm64-musl.tar.gz
            awsx-macos-amd64/awsx-macos-amd64.tar.gz
            awsx-macos-arm64/awsx-macos-arm64.tar.gz
            awsx-windows-amd64/awsx-windows-amd64.tar.gz
            awsx-windows-arm64/awsx-windows-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
